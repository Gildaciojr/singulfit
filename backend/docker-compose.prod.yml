name: nutrafit-production

x-backend-environment: &backend-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-nutrafit}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-nutrafit}?schema=public
  PRISMA_MIGRATIONS_PATH: /app/prisma/migrations
  UPLOAD_PATH: /app/uploads

x-backend-service: &backend-service
  image: nutrafit-backend:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - ${ENV_FILE:-.env.production}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  volumes:
    - nutrafit_uploads:/app/uploads

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrafit}
      POSTGRES_USER: ${POSTGRES_USER:-nutrafit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-nutrafit} -d ${POSTGRES_DB:-nutrafit}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - nutrafit_postgres:/var/lib/postgresql/data

  migrate:
    image: nutrafit-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      <<: *backend-environment
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  backend-api:
    <<: *backend-service
    environment:
      <<: *backend-environment
      RUNTIME_MODE: API
    command: ["node", "dist/main.js"]
    ports:
      - 127.0.0.1:${API_PORT:-3000}:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/v1/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker-outbox:
    <<: *backend-service
    environment:
      <<: *backend-environment
      RUNTIME_MODE: WORKER
      WORKER_ROLE: OUTBOX
    command: ["node", "dist/main.worker.js", "outbox"]

  worker-ai:
    <<: *backend-service
    environment:
      <<: *backend-environment
      RUNTIME_MODE: WORKER
      WORKER_ROLE: AI
    command: ["node", "dist/main.worker.js", "ai"]

  worker-automation:
    <<: *backend-service
    environment:
      <<: *backend-environment
      RUNTIME_MODE: WORKER
      WORKER_ROLE: AUTOMATION
    command: ["node", "dist/main.worker.js", "automation"]

volumes:
  nutrafit_postgres:
  nutrafit_uploads:
